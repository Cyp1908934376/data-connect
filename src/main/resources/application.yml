server:
  port: 8010
  tomcat:
    uri-encoding: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: data-connect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration
  # H2 嵌入式数据库 - 文件模式，数据持久化到 ./data 目录
  datasource:
    url: jdbc:h2:file:./data/dataconnect;AUTO_SERVER=TRUE;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  # JPA
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        connection:
          CharSet: UTF-8
          characterEncoding: UTF-8
          useUnicode: true
  # H2 Web Console (开发调试用, 正式环境可关闭)
  h2:
    console:
      enabled: true
      path: /h2-console
  # FreeMarker
  freemarker:
    template-loader-path: classpath:/templates/
    suffix: .ftl
    cache: true
    charset: UTF-8
    check-template-location: true
    expose-request-attributes: true
    expose-session-attributes: true
    settings:
      datetime_format: yyyy-MM-dd HH:mm:ss
      date_format: yyyy-MM-dd
      time_format: HH:mm:ss
      number_format: 0.######
  # 初始化数据库
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# 应用配置
app:
  driver:
    # 外部驱动目录，PropertiesLauncher 会从该目录加载 JDBC 驱动 jar
    path: drivers/
    # Maven 仓库镜像地址（逗号分隔，下载时可选）
    maven-urls: https://repo1.maven.org/maven2,https://maven.aliyun.com/repository/central,https://mirrors.tuna.tsinghua.edu.cn/maven2
  # H2 数据库文件目录（相对于 jar 运行目录）
  data-dir: data/
  auth:
    # 是否启用登录认证，开发模式可设为 false
    enabled: false

# Knife4j API 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh-CN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**

logging:
  level:
    root: WARN
    com.dataconnect: INFO
    # Spring Boot startup
    org.springframework.boot: INFO
    # Web request mapping
    org.springframework.web: INFO
    org.springframework.web.servlet: INFO
    # Embedded Tomcat
    org.apache.catalina: INFO
    org.apache.coyote: INFO
    # HikariCP connection pool
    com.zaxxer.hikari: INFO
    # Hibernate SQL (set to DEBUG to see SQL statements)
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    # OkHttp
    okhttp3: INFO
    # Spring SQL init DEBUG - 查看schema.sql/data.sql是否执行
    org.springframework.jdbc.datasource.init: DEBUG
  file:
    path: ./logs
  # Pattern for console output (colored with ANSI)
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
